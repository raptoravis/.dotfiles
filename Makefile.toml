# ==============================================================================
# Makefile.toml - Main Installation & Setup Tasks
# ==============================================================================
# This file handles initial setup and tool installation.
# For daily operations and utilities, see Makefile.utils.toml
#
# Quick start:
#     $ cargo make help               # Show most common commands
#     $ cargo make init               # Initial setup
#     $ cargo make deploy-and-backup  # Deploy dotfiles + git backup
#
# More commands:
#     $ cargo make update             # Update all tools
#     $ cargo make info               # See all available commands
#     $ cargo make doctor             # Check system health
# ==============================================================================

# Import utility tasks
extend = "Makefile.utils.toml"


# ==========================
# ==== Main Setup Task =====
# ==========================
[tasks.init]
description = "Set up the development environment"
dependencies = [
    "install-rust",            # Install Rust and its components
    "install-tools",           # Install platform-specific tools
    "install-coreutils",       # Install platform-specific coreutils
    "install-rust-tools",      # Install additional Rust tools
    "install-mise",            # Install mise runtime manager
    "dotfiles",                # Symlink dotfiles
    "install-ai-clis",         # Claude Code / Codex / OpenCode CLIs (npm)
    "install-graphify-skill",  # Register graphify skill into each CLI (user-global)
    "post-install-hint",       # Print per-project graphify usage hint
]

[tasks.install-ai-clis]
description = "Install Claude Code / Codex / OpenCode CLIs via npm"
script = [
    "echo --- Installing AI coding CLIs ---",
    "npm install -g @anthropic-ai/claude-code || echo '  claude-code install failed (need npm on PATH)'",
    "npm install -g @openai/codex             || echo '  codex install failed'",
    "npm install -g opencode-ai               || echo '  opencode install failed'",
]

[tasks.install-graphify-skill]
description = "Register graphify skill into Claude Code / Codex / OpenCode (user-global, one-time)"
script = [
    "echo --- Registering graphify skill for claude / codex / opencode ---",
    "graphify install --platform claude   || echo '  skip claude (graphify not on PATH yet)'",
    "graphify install --platform codex    || echo '  skip codex'",
    "graphify install --platform opencode || echo '  skip opencode'",
]

[tasks.post-install-hint]
description = "Print per-project graphify activation reminder"
script = [
    "echo ''",
    "echo '============================================================'",
    "echo ' graphify: per-project setup'",
    "echo '============================================================'",
    "echo ' For each project where you want a knowledge graph, run:'",
    "echo ''",
    "echo '   cd <your-project>'",
    "echo '   graphify hook install     # auto-rebuild on commit/checkout'",
    "echo '   graphify update .         # initial AST build (no API cost)'",
    "echo ''",
    "echo ' Then in your AI coding CLI (any of these works):'",
    "echo '   claude     # Claude Code     -> /graphify .'",
    "echo '   codex      # OpenAI Codex    -> /graphify .'",
    "echo '   opencode   # OpenCode        -> /graphify .'",
    "echo '============================================================'",
]

[tasks.install-rust]
description = "Install Rust toolchain components."
script = [
    "rustup component add clippy",
    "rustup component add rustfmt"
]

[tasks.install-rust-tools]
script = [
    "cargo install dotter",
    "cargo install cargo-update",
    "cargo install vivid",
    "cargo install eza",
    "cargo install bottom",
    "cargo install bat",
]

[tasks.install-mise]
description = "Install mise runtime manager"
windows_alias = "install-mise-cargo"
mac_alias = "install-mise-cargo"
linux_alias = "install-mise-apt"

[tasks.install-mise-cargo]
script = ["cargo install mise"]

[tasks.install-mise-apt]
condition = { platforms = ["linux"] }
script = [
    "echo '--- Installing mise via install script ---'",
    "curl https://mise.jdx.dev/install.sh | sh",
]

# Platform-Specific Coreutils Installation
[tasks.install-coreutils]
windows_alias = "windows-core-utils"
mac_alias = "mac-core-utils"
linux_alias = "linux-core-utils"

[tasks.windows-core-utils]
condition = { platforms = ["windows"] }
script = [
    "cargo install coreutils --features windows"
]

[tasks.mac-core-utils]
condition = { platforms = ["mac"] }
script = [
    "cargo install coreutils --features macos"
]

[tasks.linux-core-utils]
condition = { platforms = ["linux"] }
script = [
    "echo '--- Linux coreutils provided by system ---'",
]

# Platform-Specific Tool Installation
[tasks.install-tools]
windows_alias = "windows-tools"
mac_alias = "mac-tools"
linux_alias = "linux-tools"

[tasks.windows-tools]
script = [
    "echo --- Installing Tools ---",
    "scoop bucket add extras 2>nul || echo extras bucket already added",
    "scoop bucket add nerd-fonts 2>nul || echo nerd-fonts bucket already added",
    "scoop bucket add versions 2>nul || echo versions bucket already added",
    "scoop install lazygit neovim yazi wezterm fzf ripgrep bat FiraCode-NF",

    "echo --- Installing Languages ---",
    "scoop install python go lua lua51 luarocks stylua",

    "echo --- Installing Dependencies ---",
    "scoop install autohotkey gcc cmake fastfetch firacode",
    "scoop shim add gcc ~\\scoop\\apps\\gcc\\current\\bin\\gcc.exe", # Needed for NVim Telescope FZF Native

    "echo --- Installing Scoopfile (if exists) ---",
    "if exist %USERPROFILE%\\.dotfiles\\scoopfile.json (",
    "  for /f \"tokens=1\" %%i in (%USERPROFILE%\\.dotfiles\\scoopfile.json) do scoop install %%i 2>nul || echo Skipping %%i",
    ")",

    "echo --- Installing Python CLI tools via uv ---",
    "if exist %USERPROFILE%\\.dotfiles\\uv-tools.txt (",
    "  for /f %%p in (%USERPROFILE%\\.dotfiles\\uv-tools.txt) do uv tool install %%p 2>nul || echo Skipping %%p",
    ")",

    "echo --- Setting Environment Variables ---",
    'setx XDG_CONFIG_HOME "%USERPROFILE%\\.config"', # Nushell home directory
    'setx YAZI_CONFIG_HOME "%USERPROFILE%\\.config\\yazi"', # Yazi config file
]

[tasks.mac-tools]
script = [
    "echo '--- Installing via Brewfile ---'",
    "brew bundle --file=~/.dotfiles/Brewfile",

    "echo '--- Installing Oh My Zsh ---'",
    'export ZSH="$HOME/.config/zsh/ohmyzsh"',
    'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"',

    "echo '--- Installing Oh My Zsh Plugins ---'",
    "git clone https://github.com/Aloxaf/fzf-tab $HOME/.config/zsh/ohmyzsh/custom/plugins/fzf-tab 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-autosuggestions $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-autosuggestions 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-syntax-highlighting $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-syntax-highlighting 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-completions $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-completions 2>/dev/null || true",

    "echo '--- Installing Python CLI tools via uv ---'",
    "if [ -f ~/.dotfiles/uv-tools.txt ]; then",
    "  while read -r package; do",
    "    [ -n \"$package\" ] && uv tool install $package 2>/dev/null || echo \"Skipping $package\"",
    "  done < ~/.dotfiles/uv-tools.txt",
    "fi",

    "echo '--- Setting Environment Variables ---'",
    "export YAZI_CONFIG_HOME=\"~/.config/yazi\"",
]

[tasks.linux-tools]
condition = { platforms = ["linux"] }
script = [
    "echo '--- Installing WSL2/Linux tools via apt ---'",
    "sudo apt update",
    "sudo apt install -y zsh fzf ripgrep fd-find bat neovim cmake curl git build-essential pkg-config libssl-dev fastfetch tmux mosh",

    "echo '--- Installing Oh My Zsh ---'",
    'export ZSH="$HOME/.config/zsh/ohmyzsh"',
    'sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)" "" --unattended 2>/dev/null || true',

    "echo '--- Installing Oh My Zsh Plugins ---'",
    "git clone https://github.com/Aloxaf/fzf-tab $HOME/.config/zsh/ohmyzsh/custom/plugins/fzf-tab 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-autosuggestions $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-autosuggestions 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-syntax-highlighting $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-syntax-highlighting 2>/dev/null || true",
    "git clone https://github.com/zsh-users/zsh-completions $HOME/.config/zsh/ohmyzsh/custom/plugins/zsh-completions 2>/dev/null || true",

    "echo '--- Installing CLI tools ---'",
    "curl -sS https://starship.rs/install.sh | sh -s -- -y",
    "cargo install yazi-fm yazi-cli",
    "go install github.com/jesseduffield/lazygit@latest",
    "go install github.com/jesseduffield/lazydocker@latest",

    "echo '--- Installing wslu (WSL utilities) ---'",
    "sudo apt install -y wslu 2>/dev/null || true",

    "echo '--- Installing Python CLI tools via uv ---'",
    "if [ -f ~/.dotfiles/uv-tools.txt ]; then",
    "  while read -r package; do",
    "    [ -n \"$package\" ] && uv tool install $package 2>/dev/null || echo \"Skipping $package\"",
    "  done < ~/.dotfiles/uv-tools.txt",
    "fi",

    "echo '--- Default shell set via /etc/wsl.conf ---'",

    "echo '--- Deploying wsl.conf ---'",
    "sudo cp /mnt/c/Users/2015m/.dotfiles/windows/wsl/wsl.conf /etc/wsl.conf",

    "echo '--- Setting WSL hostname for dotter ---'",
    "sudo hostnamectl set-hostname mitch-wsl",

    "echo '--- Creating ZDOTDIR bootstrap ---'",
    'echo export ZDOTDIR=\$HOME/.config/zsh > ~/.zshenv',
]

[tasks.dotfiles]
description = "Symlink all the .dotfiles depending on dotter/system.toml files"
script = [
    "echo --- Creating Symlinks ---",
    "dotter -v",
]

# ==========================
# ==== Main Update Task ====
# ==========================
[tasks.update]
description = "Update all tools, dependencies, and configurations"
dependencies = [
    "update-rust",            # Update Rust toolchain and components
    "update-platform-tools",  # Update platform-specific tools (incl. uv tool upgrade --all)
    "update-mise",            # Update mise configurations
    "dotfiles",               # Take the chance to validate the dotfiles
]

# Rust Toolchain Update
[tasks.update-rust]
script = [
    "rustup self update",
    "rustup update",
    "cargo install-update -a"
]

# Platform-Specific Tools Update
[tasks.update-platform-tools]
windows_alias = "update-windows-tools"
mac_alias = "update-mac-tools"
linux_alias = "update-linux-tools"

[tasks.update-windows-tools]
script = [
    "echo --- Updating Scoop & Packages ---",
    "scoop update",
    "scoop update *",

    "echo --- Updating Python CLI tools ---",
    "uv tool upgrade --all",
]

[tasks.update-mac-tools]
script = [
    "echo --- Updating Homebrew & Packages ---",
    "brew update",
    "brew upgrade",
    "brew upgrade --cask wezterm@nightly --no-quarantine --greedy-latest",

    "echo --- Updating Python CLI tools ---",
    "uv tool upgrade --all",
]

[tasks.update-linux-tools]
condition = { platforms = ["linux"] }
script = [
    "echo '--- Updating apt packages ---'",
    "sudo apt update && sudo apt upgrade -y",

    "echo '--- Updating Python CLI tools ---'",
    "uv tool upgrade --all",
]

[tasks.update-mise]
script = ["echo --- Updating Global Mise Packages ---", "mise install"]

# ================================
# ==== Check for Updates Task ====
# ================================
[tasks.check-outdated]
description = "Set up the development environment"
dependencies = [
    "check-outdated-rust",    # Check rustup for updates
    "check-package-managers", # Check platform specific updates
]

[tasks.check-outdated-rust]
script = [
    "echo --- Checking for available updates (without applying) ---",
    "rustup update --no-self-update || echo 'Rustup is up-to-date'",
]

[tasks.check-package-managers]
windows_alias = "check-outdated-windows"
mac_alias = "check-outdated-mac"
linux_alias = "check-outdated-linux"

[tasks.check-outdated-windows]
script = [
    "echo --- Checking for outdated Scoop packages ---",
    "scoop status || echo 'Scoop not found or not running on Windows'",
]

[tasks.check-outdated-mac]
script = [
    "echo --- Checking for outdated Homebrew packages ---",
    "brew outdated || echo 'No outdated packages found or not running on macOS'",
]

[tasks.check-outdated-linux]
condition = { platforms = ["linux"] }
script = [
    "echo '--- Checking for upgradeable apt packages ---'",
    "apt list --upgradeable 2>/dev/null || echo 'apt not available'",
]
