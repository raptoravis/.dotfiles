# tmux config — WSL/Moshi primary, zellij-style UX

# Prefix: C-a (frees C-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"
set -as terminal-features ",*:RGB"
set -g mouse on
set -g history-limit 100000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g focus-events on
set -sg escape-time 10
set -g status-keys vi
setw -g mode-keys vi
set -g set-titles on
# wezterm reads pane.title to display per-tab cwd basename. tmux captures
# OSC 7 from the inner shell instead of forwarding it, so surface the
# current path through the OSC 2 title sequence here.
set -g set-titles-string "#{b:pane_current_path}"

# Reload
bind r source-file ~/.tmux.conf \; display "reloaded"

# Splits keep cwd
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keep cwd
bind c new-window -c "#{pane_current_path}"

# Vim-style pane nav
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick window switch (Alt+number, no prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Vim-style copy
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# fzf session switcher (prefix + s)
bind s display-popup -E -w 60% -h 60% "\
  tmux list-sessions -F '#S' \
  | grep -v \"^$(tmux display-message -p '#S')\$\" \
  | fzf --reverse --prompt='session> ' \
  | xargs -r tmux switch-client -t"

# fzf window switcher across all sessions (prefix + w)
bind w display-popup -E -w 80% -h 60% "\
  tmux list-windows -a -F '#S:#I  #W' \
  | fzf --reverse --prompt='window> ' \
  | awk '{print \$1}' \
  | xargs -r tmux switch-client -t"

# New session prompt (prefix + S)
bind S command-prompt -p "session name:" "new-session -d -s '%%' \; switch-client -t '%%'"

# Kill session quick (prefix + X)
bind X confirm-before -p "kill session #S? (y/n)" kill-session

# === Status bar — zellij-style tabs ===
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 80

# Colors — muted cool palette (slate/lavender/steel, no warm hues)
set -g status-style "bg=#16161e,fg=#545c7e"
# Rounded powerline separators (require Nerd Font):
#   left half-circle, right half-circle
# Hex colors and commas inside #{?...} body need ## and #, escapes.
# Per-client adaptive status: clear custom styling under Moshi so the
# swipe-to-change-window gesture can read tmux's default bar reliably.
# Local clients get the themed bar.
set -g status-left "#{?#{!=:#{client_environment:MOSHI_CLIENT},},,#[fg=##3d59a1#,bg=##16161e]▐#[fg=##c0caf5#,bg=##3d59a1] #S #[fg=##3d59a1#,bg=##16161e]▌ }"
set -g status-right "#{?#{!=:#{client_environment:MOSHI_CLIENT},},,#[fg=##3b4261#,bg=##16161e]▐#[fg=##c0caf5#,bg=##3b4261] #(basename #{pane_current_path}) #[fg=##565f89#,bg=##3b4261]│ %H:%M #[fg=##3b4261#,bg=##16161e]▌}"

# Window tabs — themed locally, simple under Moshi
set -g window-status-format "#{?#{!=:#{client_environment:MOSHI_CLIENT},}, #I:#W ,  #[fg=##545c7e#,bg=##16161e]#I:#W  }"
set -g window-status-current-format "#{?#{!=:#{client_environment:MOSHI_CLIENT},}, #I:#W ,#[fg=##3b4261#,bg=##16161e]▐#[fg=##c0caf5#,bg=##3b4261] #I:#W #[fg=##3b4261#,bg=##16161e]▌}"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#7e8eb3,bg=#16161e"

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#3d59a1"

# Message style
set -g message-style "bg=#3b4261,fg=#c0caf5"

# Inherit Moshi-detection vars into new panes
set -ga update-environment "MOSHI_CLIENT TERM_PROGRAM LC_TERMINAL"

# === Zellij-style modes (sticky key tables + bottom hint line) ===
# Two-line status: line 0 = main bar, line 1 = mode hint
set -g status 2
# Plain-text hint inside conditionals (avoids escape hell). Style applied at edges.
set -g status-format[1] "#[bg=#16161e,fg=#7e8eb3,align=left]#{?#{==:#{client_key_table},PANE}, [PANE] h/j/k/l:nav  s:vsplit  v:hsplit  x:close  z:zoom  Esc/q:exit,#{?#{==:#{client_key_table},RESIZE}, [RESIZE] h/j/k/l:±5  H/J/K/L:±10  Esc/q:exit,#{?#{==:#{client_key_table},TAB}, [TAB] 1-9:jump  n/p:next/prev  c:new  x:close  Esc/q:exit, prefix(C-a) + p:pane  t:tab  R:resize  s:sessions  w:windows  ?:help}}}"

# Enter modes
bind p switch-client -T PANE
bind t switch-client -T TAB
bind R switch-client -T RESIZE

# Help popup — list all bindings
bind ? display-popup -E -h 80% -w 80% "tmux list-keys -N | sort | less"

# --- PANE table ---
bind -T PANE h select-pane -L \; switch-client -T PANE
bind -T PANE j select-pane -D \; switch-client -T PANE
bind -T PANE k select-pane -U \; switch-client -T PANE
bind -T PANE l select-pane -R \; switch-client -T PANE
bind -T PANE s split-window -v -c "#{pane_current_path}" \; switch-client -T PANE
bind -T PANE v split-window -h -c "#{pane_current_path}" \; switch-client -T PANE
bind -T PANE x kill-pane \; switch-client -T PANE
bind -T PANE z resize-pane -Z \; switch-client -T PANE
bind -T PANE q set -u key-table
bind -T PANE Escape set -u key-table

# --- RESIZE table ---
bind -T RESIZE h resize-pane -L 5 \; switch-client -T RESIZE
bind -T RESIZE j resize-pane -D 5 \; switch-client -T RESIZE
bind -T RESIZE k resize-pane -U 5 \; switch-client -T RESIZE
bind -T RESIZE l resize-pane -R 5 \; switch-client -T RESIZE
bind -T RESIZE H resize-pane -L 10 \; switch-client -T RESIZE
bind -T RESIZE J resize-pane -D 10 \; switch-client -T RESIZE
bind -T RESIZE K resize-pane -U 10 \; switch-client -T RESIZE
bind -T RESIZE L resize-pane -R 10 \; switch-client -T RESIZE
bind -T RESIZE q set -u key-table
bind -T RESIZE Escape set -u key-table

# --- TAB (window) table ---
bind -T TAB 1 select-window -t 1 \; switch-client -T TAB
bind -T TAB 2 select-window -t 2 \; switch-client -T TAB
bind -T TAB 3 select-window -t 3 \; switch-client -T TAB
bind -T TAB 4 select-window -t 4 \; switch-client -T TAB
bind -T TAB 5 select-window -t 5 \; switch-client -T TAB
bind -T TAB 6 select-window -t 6 \; switch-client -T TAB
bind -T TAB 7 select-window -t 7 \; switch-client -T TAB
bind -T TAB 8 select-window -t 8 \; switch-client -T TAB
bind -T TAB 9 select-window -t 9 \; switch-client -T TAB
bind -T TAB n next-window \; switch-client -T TAB
bind -T TAB p previous-window \; switch-client -T TAB
bind -T TAB c new-window -c "#{pane_current_path}" \; switch-client -T TAB
bind -T TAB x kill-window \; switch-client -T TAB
bind -T TAB q set -u key-table
bind -T TAB Escape set -u key-table

# === TPM (tmux plugin manager) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect — preserve nvim sessions, shell history, pane contents
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# continuum — auto-save every 15min, auto-restore on tmux start
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Auto-clone TPM on first run (plugins installed via `prefix + I`)
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
