# ~/.config/starship.toml

# Timeout for commands (ms)
command_timeout = 500

# Don't add blank line before prompt
add_newline = false

# Format - customize order of modules (left side)
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$rust\
$golang\
$docker_context\
$custom\
$line_break\
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = false
style = "bold cyan"
read_only = " 󰌾"

[git_status]
style = "bold yellow"
conflicted = "🏳"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "$"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Your custom Databricks module
[custom.databricks]
command = "echo $DATABRICKS_ENV"
when = "test -n \"$DATABRICKS_ENV\""
format = "[◆ DB:$output]($style) "
style = "bold blue"

[python]
symbol = " "
# Prefer the project venv (uv/poetry/etc.) over the system python on PATH,
# so the prompt reflects the version actually used by `uv run python`.
python_binary = [
    ".venv/Scripts/python.exe",  # Windows venv
    ".venv/bin/python",          # Unix venv
    "python",
    "python3",
]

[rust]
symbol = "󱘗 "

[golang]
symbol = " "
